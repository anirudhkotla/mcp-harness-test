<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mcp Harness Test</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="counter-panel" aria-labelledby="app-title">
      <div class="header-row">
        <div>
          <p class="eyebrow">Interactive counter</p>
          <h1 id="app-title">Mcp Harness Test</h1>
        </div>
        <div class="best-score" id="best-score">Best 0</div>
      </div>

      <div class="counter-display" aria-live="polite">
        <span id="count">0</span>
      </div>

      <div class="controls" aria-label="Counter controls">
        <button type="button" id="decrement">Decrease</button>
        <button type="button" id="increment">Increase</button>
        <button type="button" id="reset">Reset</button>
      </div>

      <p class="hint">Your best score is saved in this browser.</p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
